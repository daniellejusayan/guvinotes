<!doctype html>
<html>
  <head>
    <title>CSS Class</title>

    <!-- internal style sheet -->
    <style>
      h1 {
        color: blue;
      }

      p {
        color: red;
      }

      div {
        color: green;
      }

      main {
        background-color: lightgray;
      }
    </style>

    <link rel="stylesheet" href="/styles.css" />
  </head>

  <!-- basically inline is always followed. Then based on the sequence of the stylesheet
  being before or after the internal style sheet, the style that is declared the last will follow -->
  <body>
    <h1 style="color: hotpink">This is a heading</h1>
    <p style="color: orange">This is a paragraph.</p>
    <div style="color: purple">This is a div.</div>
    <main>
      <h1>Main section: This is a heading</h1>
      <p>This is a paragraph.</p>
      <div>This is a div.</div>
    </main>

    <footer style="color: orange; color: green; color: purple">
      &copy; All rights reserved
    </footer>
  </body>
</html>
