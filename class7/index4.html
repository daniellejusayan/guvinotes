<!-- border -->
 <!-- css border is used to add the lines or border around HTML elements div, p, h1, h2, etc. -->

<style>
    .addBorder {
        border-width: 5px 10px 15px 20px;
        border-style: dashed dotted solid double;
        border-color: beige blue black red;
        border-top: 5px solid orange;
        border: 4px solid black;
        border-right:0cap;
        border-bottom: 5px dashed green;
        border-left: 10px double red;
    }

        /* padding */
        section {
            border: 4px solid blue;
            padding: 5px 10px 15px 20px;
            padding-top: 5px;
            padding-right: 10px;
            padding-bottom: 15px;
            padding-left: 20px;

        /* margin */
        margin: 5px 10px 15px 20px;
        margin-top: 5px; 
        margin-right: 10px;
        margin-bottom: 15px;
        margin-left: 20px;
        border: 4px solid blue;

        }
</style>

<div class="addBorder">
    This is a div with border
    </div>

    <br/>
    <br/>
    <section>
        This is a section with border, padding and margin
    </section>

<!--
    4 values 
    top right bottom left
    
    3 values
    top right&left bottom

    1 value
    color will apply to all the sides

    PADDING: used to give space around the content inside the border.
    MARGIN: used to give space around the outside of the element border.
    -->
