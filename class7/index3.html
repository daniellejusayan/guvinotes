<!DOCTYPE html>
<html>
<head>
    <title>CSS Grouping Selector</title>
</head>
<body>
<style>
    /* grouping selector */
    header, main, footer {
        color: green;
        background-color: black;
        margin: 10px;
    }
</style>

<header>
    <h1>This is a heading</h1>
</header>
<main>
    <p>This is a paragraph.</p>
</main>
<footer>
    <p>&copy; All rights reserved</p>
    </footer> 
    </body>
</html>
