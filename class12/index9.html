<input type="text" class="username" placeholder="Enter your username">
<button onclick="checkName()">Submit</button>

<script>
    function checkName() {
        const user = document.querySelector(".username").value

        if(user ==="") {
            alert("Please enter the username");
        } else {
            alert("Welcome! " + user);
        }
    }
</script>
